<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Among Us · Escape Room</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --accent: #c51111;        /* crewmate red */
      --accent-dark: #7a0838;
      --bg: #0f1626;            /* The Skeld dark steel */
      --visor: #9fd3ff;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', sans-serif;
      overflow: hidden;
      position: relative;
      transition: background 1s ease;
    }

    /* starfield */
    #particles {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 0;
    }

    /* drifting crewmates in the background */
    .floaters { position: fixed; inset: 0; pointer-events: none; z-index: 1; overflow: hidden; }
    .floater {
      position: absolute;
      width: 46px; height: 56px;
      opacity: 0.18;
      animation: drift linear infinite;
    }
    @keyframes drift {
      0%   { transform: translate(-60px, 0) rotate(0deg); }
      100% { transform: translate(110vw, -40px) rotate(360deg); }
    }

    /* ── TIMER BAR ── */
    .timer-bar {
      position: fixed;
      top: 0; left: 0;
      width: 100%;
      z-index: 30;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 16px;
      gap: 6px;
    }
    .timer-display {
      font-size: 2.4rem;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: 4px;
      font-variant-numeric: tabular-nums;
      text-shadow: 0 0 20px rgba(197,17,17,0.45);
      transition: color 0.4s, transform 0.2s;
    }
    .timer-display.warning { color: #ff8c42; }
    .timer-display.danger  { color: #ff4757; animation: pulse-timer 1s ease infinite; }
    @keyframes pulse-timer {
      0%,100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
    .timer-track {
      width: min(600px, 90vw);
      height: 6px;
      background: rgba(255,255,255,0.1);
      border-radius: 3px;
      overflow: hidden;
    }
    .timer-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent-dark));
      width: 100%;
      transition: width 1s linear, background 0.5s;
      border-radius: 3px;
    }
    .timer-fill.warning { background: linear-gradient(90deg, #ff8c42, #ff6b35); }
    .timer-fill.danger  { background: linear-gradient(90deg, #ff4757, #c0392b); }

    .room-label {
      position: fixed;
      top: 90px;
      color: rgba(255,255,255,0.5);
      font-size: 0.85rem;
      letter-spacing: 4px;
      text-transform: uppercase;
      z-index: 30;
    }

    /* ── CONTAINER ── */
    .container {
      position: relative; z-index: 10;
      display: flex; flex-direction: column;
      align-items: center; gap: 30px;
    }

    /* ── CREWMATE (replaces the lock) ── */
    .crew-stage { width: 200px; height: 200px; position: relative; display: flex; align-items: center; justify-content: center; }

    .crewmate {
      position: relative;
      width: 110px; height: 132px;
      filter: drop-shadow(0 14px 22px rgba(0,0,0,0.55));
      transition: transform 0.5s cubic-bezier(0.68,-0.55,0.27,1.55);
      animation: crew-bob 2.6s ease-in-out infinite;
    }
    @keyframes crew-bob { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }

    /* backpack */
    .crew-pack {
      position: absolute;
      right: -16px; top: 40px;
      width: 30px; height: 56px;
      background: var(--accent);
      filter: brightness(0.82);
      border-radius: 12px;
      box-shadow: inset -4px 0 6px rgba(0,0,0,0.25);
    }
    /* body */
    .crew-body {
      position: absolute;
      left: 8px; top: 10px;
      width: 78px; height: 104px;
      background: var(--accent);
      border-radius: 48px 48px 40px 40px / 60px 60px 30px 30px;
      box-shadow: inset -10px -6px 14px rgba(0,0,0,0.28),
                  inset 8px 6px 12px rgba(255,255,255,0.18);
    }
    /* legs */
    .crew-leg {
      position: absolute;
      bottom: -2px;
      width: 26px; height: 22px;
      background: var(--accent);
      filter: brightness(0.92);
    }
    .crew-leg.l { left: 16px; border-radius: 0 0 6px 12px; }
    .crew-leg.r { left: 50px; border-radius: 0 0 12px 6px; }
    /* visor */
    .crew-visor {
      position: absolute;
      left: 30px; top: 30px;
      width: 60px; height: 38px;
      background: linear-gradient(135deg, #cde9ff 0%, var(--visor) 45%, #5b8fb8 100%);
      border-radius: 26px;
      border: 5px solid rgba(0,0,0,0.22);
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.15);
      overflow: hidden;
    }
    .crew-visor::after {
      content: '';
      position: absolute;
      left: 8px; top: 6px;
      width: 22px; height: 12px;
      background: rgba(255,255,255,0.85);
      border-radius: 50%;
      transform: rotate(-12deg);
    }

    /* ejected / unlocked celebration */
    .crew-stage.unlocked .crewmate {
      animation: eject 0.9s ease-in forwards;
    }
    @keyframes eject {
      0%   { transform: translateY(0) rotate(0); }
      100% { transform: translateY(-260px) rotate(40deg) scale(0.6); opacity: 0; }
    }

    /* ── PANEL (keypad housing) ── */
    .panel {
      background: rgba(20,30,48,0.72);
      border: 1px solid rgba(159,211,255,0.22);
      border-radius: 20px;
      padding: 30px 36px;
      backdrop-filter: blur(12px);
      display: flex; flex-direction: column;
      align-items: center; gap: 18px;
      min-width: 520px;
      box-shadow: 0 8px 40px rgba(0,0,0,0.55), inset 0 0 0 1px rgba(255,255,255,0.03);
      transition: border-color 1s;
    }
    .panel h2 {
      color: var(--visor); font-size: 1.05rem; font-weight: 600;
      letter-spacing: 3px; text-transform: uppercase;
      display: flex; align-items: center; gap: 8px;
    }
    .code-inputs { display: flex; gap: 8px; flex-wrap: nowrap; }
    .code-inputs input {
      width: 42px; height: 52px; text-align: center;
      font-size: 1.4rem; font-weight: 700;
      background: rgba(159,211,255,0.06);
      border: 2px solid rgba(159,211,255,0.3);
      border-radius: 12px; color: #fff; outline: none;
      transition: border-color 0.2s, background 0.2s, transform 0.1s;
      caret-color: var(--accent);
    }
    .code-inputs input:focus {
      border-color: var(--visor);
      background: rgba(159,211,255,0.14);
      transform: scale(1.05);
    }
    .code-inputs input.shake { animation: shake 0.4s ease; border-color: #e05555; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      20% { transform: translateX(-6px); } 40% { transform: translateX(6px); }
      60% { transform: translateX(-4px); } 80% { transform: translateX(4px); }
    }

    .btn-row { display: flex; gap: 14px; }
    .btn {
      padding: 13px 32px;
      border: none; border-radius: 50px;
      font-size: 0.95rem; font-weight: 700;
      letter-spacing: 2px; text-transform: uppercase;
      cursor: pointer; transition: transform 0.2s, box-shadow 0.2s, opacity 0.2s;
    }
    .btn-unlock {
      background: linear-gradient(135deg, var(--accent), var(--accent-dark));
      color: #fff;
      box-shadow: 0 4px 20px rgba(197,17,17,0.45);
    }
    .btn-unlock:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(197,17,17,0.65); }
    .btn-hint {
      background: transparent; color: var(--visor);
      border: 2px solid rgba(159,211,255,0.45);
    }
    .btn-hint:hover { background: rgba(159,211,255,0.12); }
    .btn-hint:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── HINT BOX ── */
    .hint-box {
      max-width: 520px;
      background: rgba(159,211,255,0.08);
      border-left: 3px solid var(--visor);
      border-radius: 8px;
      padding: 14px 18px;
      color: rgba(255,255,255,0.88);
      font-size: 0.95rem;
      display: none;
      z-index: 10;
    }
    .hint-box.show { display: block; animation: fadeIn 0.4s ease; }
    .hint-box .hint-item { margin: 4px 0; }
    .hint-box .hint-item::before { content: '🛰️ '; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(-8px); } to { opacity: 1; } }

    /* ── SUCCESS / GAME OVER ── */
    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.9);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 100; opacity: 0; pointer-events: none;
      transition: opacity 0.5s ease;
    }
    .overlay.visible { opacity: 1; pointer-events: all; }
    .overlay-card {
      background: linear-gradient(135deg, #16213e, #0b1020);
      border: 2px solid var(--accent);
      border-radius: 30px;
      padding: 50px 70px;
      text-align: center;
      box-shadow: 0 0 80px rgba(197,17,17,0.35), 0 20px 60px rgba(0,0,0,0.6);
      transform: scale(0.7);
      transition: transform 0.6s cubic-bezier(0.34,1.56,0.64,1);
      max-width: 90vw;
    }
    .overlay.visible .overlay-card { transform: scale(1); }
    .overlay-card.lose { border-color: #ff4757; box-shadow: 0 0 80px rgba(255,71,87,0.3), 0 20px 60px rgba(0,0,0,0.6); }

    .big-emoji { font-size: 4.5rem; margin-bottom: 16px; display: block; animation: bounce 1s ease infinite alternate; }
    @keyframes bounce { from { transform: translateY(0) rotate(-5deg); } to { transform: translateY(-12px) rotate(5deg); } }

    .overlay-card h1 {
      font-size: 2.6rem;
      background: linear-gradient(135deg, var(--accent), #fff, var(--accent));
      background-size: 200%;
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      animation: shimmer 2s linear infinite; margin-bottom: 12px;
    }
    .overlay-card.lose h1 {
      background: linear-gradient(135deg, #ff4757, #fff, #ff4757);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    @keyframes shimmer { 0% { background-position: 0%; } 100% { background-position: 200%; } }
    .overlay-card p { color: rgba(255,255,255,0.7); font-size: 1.1rem; letter-spacing: 1px; }
    .final-time { color: var(--visor); font-size: 1.4rem; margin-top: 14px; font-weight: 700; }

    /* ── NAME ENTRY ── */
    .name-entry { margin-top: 24px; display: flex; flex-direction: column; gap: 12px; align-items: center; }
    .name-entry input {
      padding: 12px 18px; text-align: center;
      background: rgba(159,211,255,0.08);
      border: 2px solid rgba(159,211,255,0.35);
      border-radius: 10px; color: #fff; font-size: 1rem; outline: none;
    }
    .name-entry input:focus { border-color: var(--visor); }

    /* ── LEADERBOARD ── */
    .leaderboard { margin-top: 28px; width: 100%; max-width: 380px; }
    .leaderboard h3 { color: var(--visor); font-size: 0.9rem; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; }
    .lb-row {
      display: flex; justify-content: space-between;
      padding: 8px 14px; margin: 4px 0;
      background: rgba(255,255,255,0.04);
      border-radius: 8px; color: rgba(255,255,255,0.85);
      font-size: 0.95rem;
    }
    .lb-row .rank { color: var(--accent); font-weight: 700; margin-right: 10px; }
    .lb-row.me { background: rgba(197,17,17,0.2); }

    .btn-reset {
      margin-top: 28px; padding: 12px 30px;
      background: transparent; border: 2px solid rgba(159,211,255,0.55);
      color: var(--visor); border-radius: 50px;
      font-size: 0.85rem; letter-spacing: 2px; text-transform: uppercase; cursor: pointer;
      transition: background 0.2s;
    }
    .btn-reset:hover { background: rgba(159,211,255,0.15); }

    /* ── CONFETTI ── */
    .confetti-piece {
      position: fixed; width: 10px; height: 10px; top: -20px;
      border-radius: 2px; animation: confetti-fall linear forwards; z-index: 200;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(0) rotateZ(0) rotateX(0); opacity: 1; }
      100% { transform: translateY(110vh) rotateZ(720deg) rotateX(360deg); opacity: 0; }
    }

    /* ── ROOM PROGRESS DOTS ── */
    .room-dots { display: flex; gap: 10px; }
    .room-dot {
      width: 12px; height: 12px; border-radius: 50%;
      background: rgba(255,255,255,0.15);
      border: 2px solid rgba(255,255,255,0.2);
      transition: background 0.4s, border-color 0.4s;
    }
    .room-dot.done { background: var(--accent); border-color: var(--accent); }
    .room-dot.current { border-color: var(--visor); animation: pulse-dot 1.5s ease infinite; }
    @keyframes pulse-dot { 0%,100% { box-shadow: 0 0 0 0 rgba(159,211,255,0.5); } 50% { box-shadow: 0 0 0 6px rgba(159,211,255,0); } }

    /* ── FLASH MESSAGE from GM ── */
    .gm-flash {
      position: fixed; top: 130px; left: 50%; transform: translateX(-50%) translateY(-20px);
      background: rgba(197,17,17,0.95); color: #fff;
      padding: 14px 28px; border-radius: 50px;
      font-weight: 700; letter-spacing: 1px;
      z-index: 40; opacity: 0; pointer-events: none;
      transition: opacity 0.4s, transform 0.4s;
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }
    .gm-flash.show { opacity: 1; transform: translateX(-50%) translateY(0); }

    .paused-badge {
      position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
      background: rgba(0,0,0,0.85); border: 2px solid var(--visor);
      color: var(--visor); padding: 20px 50px; border-radius: 16px;
      font-size: 1.6rem; letter-spacing: 6px; text-transform: uppercase;
      z-index: 90; display: none;
    }
    .paused-badge.show { display: block; animation: fadeIn 0.3s ease; }

    .gm-link {
      position: fixed; bottom: 18px; right: 22px;
      color: rgba(255,255,255,0.15); font-size: 0.75rem;
      text-decoration: none; letter-spacing: 1px;
      transition: color 0.3s; z-index: 20;
    }
    .gm-link:hover { color: rgba(159,211,255,0.6); }
  </style>
</head>
<body>

<canvas id="particles"></canvas>
<div class="floaters" id="floaters"></div>

<!-- Timer -->
<div class="timer-bar">
  <div class="timer-display" id="timerDisplay">--:--</div>
  <div class="timer-track"><div class="timer-fill" id="timerFill"></div></div>
  <div class="room-dots" id="roomDots"></div>
</div>

<div class="room-label" id="roomLabel"></div>

<div class="gm-flash" id="gmFlash"></div>
<div class="paused-badge" id="pausedBadge">⏸ Reunión de emergencia</div>

<div class="container">
  <div class="crew-stage" id="crewStage">
    <div class="crewmate" id="crewmate">
      <div class="crew-pack"></div>
      <div class="crew-leg l"></div>
      <div class="crew-leg r"></div>
      <div class="crew-body"></div>
      <div class="crew-visor"></div>
    </div>
  </div>

  <div class="panel">
    <h2 id="roomTitle">🔒 Introduce el código</h2>
    <div class="code-inputs" id="codeInputs"></div>
    <div class="btn-row">
      <button class="btn btn-hint" id="btnHint">Pedir pista (-5 min)</button>
      <button class="btn btn-unlock" id="btnUnlock">Completar tarea</button>
    </div>
  </div>

  <div class="hint-box" id="hintBox"></div>
</div>

<!-- Win overlay -->
<div class="overlay" id="winOverlay">
  <div class="overlay-card">
    <span class="big-emoji">🚀</span>
    <h1>¡Tareas completadas!</h1>
    <p>La tripulación gana</p>
    <div class="final-time" id="finalTime"></div>

    <div class="name-entry" id="nameEntry">
      <input type="text" id="playerName" placeholder="Tu nombre" maxlength="16" autocomplete="off" />
      <button class="btn btn-unlock" id="btnSaveScore">Guardar récord</button>
    </div>

    <div class="leaderboard" id="leaderboard" style="display:none;">
      <h3>🏅 Mejores tiempos</h3>
      <div id="lbList"></div>
    </div>

    <button class="btn-reset" id="btnReset">Jugar de nuevo</button>
  </div>
</div>

<!-- Lose overlay -->
<div class="overlay" id="loseOverlay">
  <div class="overlay-card lose">
    <span class="big-emoji">🔪</span>
    <h1>Defeat</h1>
    <p>El impostor ganó · se acabó el tiempo</p>
    <button class="btn-reset" id="btnResetLose">Intentar de nuevo</button>
  </div>
</div>

<a class="gm-link" href="gm.html">⚙ GM</a>

<script src="shared.js"></script>
<script>
  // ── Crewmate SVG helper for floaters ──────────────────────
  function crewSVG(color, dark) {
    return `<svg viewBox="0 0 46 56" xmlns="http://www.w3.org/2000/svg">
      <rect x="30" y="20" width="13" height="24" rx="6" fill="${dark}"/>
      <path d="M6 18 C6 6 18 4 24 4 C32 4 38 10 38 20 L38 46 C38 50 36 52 32 52 L30 52 L30 44 L26 44 L26 52 L20 52 L20 44 L16 44 L16 52 L12 52 C8 52 6 50 6 46 Z" fill="${color}"/>
      <rect x="16" y="14" width="22" height="14" rx="7" fill="#9fd3ff" stroke="rgba(0,0,0,0.25)" stroke-width="2"/>
    </svg>`;
  }

  // ── Starfield particles ────────────────────────────────────
  const canvas = document.getElementById('particles');
  const pctx = canvas.getContext('2d');
  let particles = [];
  function resize() { canvas.width = innerWidth; canvas.height = innerHeight; }
  addEventListener('resize', resize); resize();
  for (let i = 0; i < 90; i++) particles.push({
    x: Math.random()*canvas.width, y: Math.random()*canvas.height,
    r: Math.random()*1.4+0.3, dx:(Math.random()-0.5)*0.25, dy:(Math.random()-0.5)*0.25,
    alpha: Math.random()*0.6+0.15, tw: Math.random()*0.02
  });
  function accentRGB() {
    return getComputedStyle(document.documentElement).getPropertyValue('--particle').trim() || '255,255,255';
  }
  (function loop(){
    pctx.clearRect(0,0,canvas.width,canvas.height);
    const c = accentRGB();
    particles.forEach(p=>{
      pctx.beginPath(); pctx.arc(p.x,p.y,p.r,0,Math.PI*2);
      pctx.fillStyle=`rgba(${c},${p.alpha})`; pctx.fill();
      p.x+=p.dx; p.y+=p.dy;
      p.alpha += p.tw; if(p.alpha>0.8||p.alpha<0.15) p.tw*=-1;
      if(p.x<0||p.x>canvas.width)p.dx*=-1;
      if(p.y<0||p.y>canvas.height)p.dy*=-1;
    });
    requestAnimationFrame(loop);
  })();

  // ── Drifting background crewmates ──────────────────────────
  const CREW_COLORS = [
    ['#c51111','#7a0838'], ['#132ed1','#09158e'], ['#117f2d','#0a4d1c'],
    ['#ed54ba','#ac2bad'], ['#ef7d0d','#b33e15'], ['#f5f557','#c2c204'],
    ['#3f474e','#1e1f26'], ['#d6e0f0','#8395a7'], ['#6b2fbb','#3b177c'],
    ['#71491e','#5e2c10'], ['#38fedc','#24a89a'], ['#50ef39','#15a30f'],
  ];
  (function spawnFloaters(){
    const wrap = document.getElementById('floaters');
    for (let i=0;i<7;i++){
      const f = document.createElement('div');
      f.className = 'floater';
      const col = CREW_COLORS[Math.floor(Math.random()*CREW_COLORS.length)];
      f.innerHTML = crewSVG(col[0], col[1]);
      f.style.top = (Math.random()*90)+'vh';
      f.style.animationDuration = (16 + Math.random()*22)+'s';
      f.style.animationDelay = (-Math.random()*30)+'s';
      const s = 0.6 + Math.random()*1.3;
      f.style.transform = `scale(${s})`;
      wrap.appendChild(f);
    }
  })();

  // ── Audio (tension tick) ───────────────────────────────────
  let audioCtx = null;
  function tick(freq=440, dur=0.08) {
    try {
      audioCtx = audioCtx || new (window.AudioContext||window.webkitAudioContext)();
      const o = audioCtx.createOscillator(), g = audioCtx.createGain();
      o.frequency.value = freq; o.type = 'sine';
      g.gain.setValueAtTime(0.08, audioCtx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime+dur);
      o.connect(g); g.connect(audioCtx.destination);
      o.start(); o.stop(audioCtx.currentTime+dur);
    } catch(e) {}
  }

  // ── State & config ─────────────────────────────────────────
  // Each "room" is an Among Us location, themed with a crewmate color.
  const ROOM_THEMES = [
    { accent:'#c51111', dark:'#7a0838', bg:'#1a0c0c', particle:'255,120,120', name:'Cafetería' },
    { accent:'#132ed1', dark:'#09158e', bg:'#070b22', particle:'120,150,255', name:'Reactor' },
    { accent:'#117f2d', dark:'#0a4d1c', bg:'#06140a', particle:'120,230,150', name:'Invernadero' },
    { accent:'#ed54ba', dark:'#ac2bad', bg:'#170617', particle:'255,140,225', name:'Electricidad' },
    { accent:'#ef7d0d', dark:'#b33e15', bg:'#1a0d04', particle:'255,170,80',  name:'Comunicaciones' },
    { accent:'#f5f557', dark:'#9a9a04', bg:'#15150a', particle:'245,245,120', name:'Escudos' },
    { accent:'#6b2fbb', dark:'#3b177c', bg:'#0e0518', particle:'180,130,240', name:'Navegación' },
    { accent:'#38fedc', dark:'#0e7490', bg:'#04161a', particle:'90,240,225',  name:'Esclusa de aire' },
  ];

  let cfg, state;
  function loadCfg() { cfg = ER.getConfig(); }
  function loadState() { state = ER.getState(); }
  loadCfg(); loadState();

  const inputsWrap = document.getElementById('codeInputs');
  let inputs = [];

  function buildInputs(len) {
    inputsWrap.innerHTML = '';
    inputs = [];
    for (let i=0;i<len;i++){
      const inp = document.createElement('input');
      inp.type='text'; inp.maxLength=1; inp.autocomplete='off'; inp.inputMode='text';
      inputsWrap.appendChild(inp); inputs.push(inp);
    }
    inputs.forEach((inp,i)=>{
      inp.addEventListener('input',()=>{
        inp.value=inp.value.toUpperCase().slice(-1);
        if(inp.value&&i<inputs.length-1)inputs[i+1].focus();
      });
      inp.addEventListener('keydown',e=>{
        if(e.key==='Backspace'&&!inp.value&&i>0)inputs[i-1].focus();
        if(e.key==='Enter')tryUnlock();
      });
      inp.addEventListener('focus',()=>inp.select());
    });
    if(inputs[0])inputs[0].focus();
  }

  function applyTheme(idx) {
    // Per-room theme override from config, else cycle through themes by room index.
    const room = cfg.rooms[idx];
    const themeIdx = (room && Number.isInteger(room.theme)) ? room.theme : idx;
    const t = ROOM_THEMES[((themeIdx % ROOM_THEMES.length) + ROOM_THEMES.length) % ROOM_THEMES.length];
    const r = document.documentElement.style;
    r.setProperty('--accent', t.accent);
    r.setProperty('--accent-dark', t.dark);
    r.setProperty('--bg', t.bg);
    r.setProperty('--particle', t.particle);
    document.body.style.background = t.bg;
    document.getElementById('roomLabel').textContent = `Sala ${idx+1} · ${t.name}`;
  }

  function renderRoomDots() {
    const wrap = document.getElementById('roomDots');
    wrap.innerHTML = '';
    cfg.rooms.forEach((_,i)=>{
      const d = document.createElement('div');
      d.className = 'room-dot';
      if(i < state.currentRoom) d.classList.add('done');
      else if(i === state.currentRoom) d.classList.add('current');
      wrap.appendChild(d);
    });
  }

  function renderRoom() {
    loadCfg();
    const idx = state.currentRoom;
    if (idx >= cfg.rooms.length) { win(); return; }
    applyTheme(idx);
    buildInputs(cfg.rooms[idx].code.length);
    document.getElementById('roomTitle').textContent =
      cfg.rooms.length > 1 ? `🔒 Sala ${idx+1} — Introduce el código` : '🔒 Introduce el código';
    document.getElementById('crewStage').classList.remove('unlocked');
    document.getElementById('hintBox').classList.remove('show');
    document.getElementById('hintBox').innerHTML = '';
    renderRoomDots();
  }

  // ── Timer ──────────────────────────────────────────────────
  let lastTickSecond = null;
  function fmt(s){ s=Math.max(0,Math.ceil(s)); const m=Math.floor(s/60); return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

  function renderTimer() {
    const total = cfg.durationSec;
    const remaining = ER.remainingSeconds(state, cfg);
    const disp = document.getElementById('timerDisplay');
    const fill = document.getElementById('timerFill');
    disp.textContent = fmt(remaining);
    const pct = total>0 ? Math.max(0, remaining/total*100) : 0;
    fill.style.width = pct+'%';

    disp.classList.remove('warning','danger');
    fill.classList.remove('warning','danger');
    if (pct <= 10) { disp.classList.add('danger'); fill.classList.add('danger'); }
    else if (pct <= 25) { disp.classList.add('warning'); fill.classList.add('warning'); }

    document.getElementById('pausedBadge').classList.toggle('show', state.paused && state.started && !state.finished);

    // tension ticks in last 10s
    if (state.started && !state.paused && !state.finished) {
      const sec = Math.ceil(remaining);
      if (sec !== lastTickSecond) {
        lastTickSecond = sec;
        if (sec <= 10 && sec > 0) tick(sec <= 3 ? 660 : 440, 0.1);
      }
    }

    if (state.started && !state.finished && remaining <= 0) lose();
  }

  setInterval(()=>{ loadState(); renderTimer(); }, 250);

  // ── Unlock logic ───────────────────────────────────────────
  function tryUnlock() {
    if (!state.started || state.paused || state.finished) return;
    const room = cfg.rooms[state.currentRoom];
    const entered = inputs.map(i=>i.value).join('');
    if (entered.length < room.code.length) return;
    if (entered.toUpperCase() === room.code.toUpperCase()) {
      document.getElementById('crewStage').classList.add('unlocked');
      tick(523,0.15); setTimeout(()=>tick(659,0.2),120); setTimeout(()=>tick(784,0.3),260);
      setTimeout(()=>{
        state.currentRoom++;
        ER.setState(state);
        if (state.currentRoom >= cfg.rooms.length) win();
        else { renderRoom(); }
      }, 900);
    } else {
      inputs.forEach(i=>i.classList.add('shake'));
      setTimeout(()=>inputs.forEach(i=>i.classList.remove('shake')),500);
      inputs.forEach(i=>i.value=''); if(inputs[0])inputs[0].focus();
      tick(180,0.15);
    }
  }
  document.getElementById('btnUnlock').addEventListener('click', tryUnlock);

  // ── Hints ──────────────────────────────────────────────────
  document.getElementById('btnHint').addEventListener('click', ()=>{
    loadCfg(); loadState();
    const room = cfg.rooms[state.currentRoom];
    const hints = room.hints || [];
    const shown = state.hintsUsed[state.currentRoom] || 0;
    if (shown >= hints.length) return;
    state.hintsUsed[state.currentRoom] = shown + 1;
    state.penaltySec = (state.penaltySec||0) + 5*60;
    ER.setState(state);
    renderHints();
  });

  function renderHints() {
    const room = cfg.rooms[state.currentRoom];
    const hints = room.hints || [];
    const shown = state.hintsUsed[state.currentRoom] || 0;
    const box = document.getElementById('hintBox');
    const btn = document.getElementById('btnHint');
    if (shown > 0) {
      box.classList.add('show');
      box.innerHTML = hints.slice(0,shown).map(h=>`<div class="hint-item">${h}</div>`).join('');
    } else {
      box.classList.remove('show');
    }
    btn.disabled = shown >= hints.length;
    btn.textContent = shown >= hints.length ? 'Sin más pistas' : 'Pedir pista (-5 min)';
  }

  // ── Win / Lose ─────────────────────────────────────────────
  function win() {
    if (state.finished) { /* still show */ }
    state.finished = true; state.won = true;
    if (!state.finishRemaining && state.finishRemaining !== 0)
      state.finishRemaining = Math.max(0, ER.remainingSeconds(state,cfg));
    ER.setState(state);
    launchConfetti();
    document.getElementById('finalTime').textContent = 'Tiempo restante: ' + fmt(state.finishRemaining);
    document.getElementById('winOverlay').classList.add('visible');
  }

  function lose() {
    state.finished = true; state.won = false;
    ER.setState(state);
    document.getElementById('loseOverlay').classList.add('visible');
  }

  // ── Leaderboard ────────────────────────────────────────────
  document.getElementById('btnSaveScore').addEventListener('click', ()=>{
    const name = (document.getElementById('playerName').value || 'Anónimo').trim().slice(0,16);
    const entry = { name, remaining: state.finishRemaining };
    const lb = ER.addScore(entry);
    document.getElementById('nameEntry').style.display='none';
    renderLeaderboard(lb, entry);
  });

  function renderLeaderboard(lb, me) {
    const wrap = document.getElementById('leaderboard');
    wrap.style.display='block';
    document.getElementById('lbList').innerHTML = lb.slice(0,10).map((e,i)=>{
      const isMe = me && e.name===me.name && e.remaining===me.remaining;
      return `<div class="lb-row ${isMe?'me':''}"><span><span class="rank">#${i+1}</span>${e.name}</span><span>${fmt(e.remaining)}</span></div>`;
    }).join('');
  }

  // ── Confetti (crewmate colors) ─────────────────────────────
  const cols = ['#c51111','#132ed1','#117f2d','#ed54ba','#ef7d0d','#f5f557','#38fedc','#fff'];
  function launchConfetti() {
    for (let i=0;i<120;i++) setTimeout(()=>{
      const p=document.createElement('div'); p.className='confetti-piece';
      p.style.left=Math.random()*100+'vw';
      p.style.background=cols[Math.floor(Math.random()*cols.length)];
      p.style.width=(Math.random()*10+6)+'px'; p.style.height=(Math.random()*6+6)+'px';
      p.style.borderRadius=Math.random()>0.5?'50%':'2px';
      const d=Math.random()*2+2; p.style.animationDuration=d+'s';
      document.body.appendChild(p); setTimeout(()=>p.remove(),d*1000+100);
    }, i*25);
  }

  // ── Reset ──────────────────────────────────────────────────
  function fullReset() {
    ER.resetState();
    document.getElementById('winOverlay').classList.remove('visible');
    document.getElementById('loseOverlay').classList.remove('visible');
    document.getElementById('nameEntry').style.display='flex';
    document.getElementById('leaderboard').style.display='none';
    loadState(); renderRoom();
  }
  document.getElementById('btnReset').addEventListener('click', fullReset);
  document.getElementById('btnResetLose').addEventListener('click', fullReset);

  // ── GM flash message ───────────────────────────────────────
  function showFlash(msg) {
    const f = document.getElementById('gmFlash');
    f.textContent = '📢 ' + msg;
    f.classList.add('show');
    setTimeout(()=>f.classList.remove('show'), 5000);
  }

  // ── Sync from GM ───────────────────────────────────────────
  ER.onMessage((m)=>{
    if (m.type === 'state') { loadState(); reconcile(); }
    if (m.type === 'config') { loadCfg(); renderRoom(); }
    if (m.type === 'flash') { showFlash(m.text); }
    if (m.type === 'reset') { fullReset(); }
  });

  let lastRoom = state.currentRoom, lastFinished = state.finished;
  function reconcile() {
    if (state.currentRoom !== lastRoom) { lastRoom = state.currentRoom; renderRoom(); }
    if (state.finished && !lastFinished) {
      lastFinished = true;
      if (state.won) win(); else lose();
    }
    if (!state.finished && lastFinished) { lastFinished=false; fullReset(); }
    renderHints();
    renderRoomDots();
  }

  // ── Init ───────────────────────────────────────────────────
  renderRoom();
  renderTimer();
  renderHints();
</script>
</body>
</html>
