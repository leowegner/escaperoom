<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel del Game Master · Escape Room</title>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    :root { --accent:#d4af37; --accent-dark:#8b6914; --bg:#0a0a1a; }
    body {
      min-height:100vh; background:var(--bg); color:#fff;
      font-family:'Segoe UI',sans-serif; padding:24px;
    }
    h1 { color:var(--accent); font-size:1.4rem; letter-spacing:3px; text-transform:uppercase; margin-bottom:4px; }
    .subtitle { color:rgba(255,255,255,0.4); font-size:0.85rem; margin-bottom:24px; }
    a.back { color:rgba(255,255,255,0.5); text-decoration:none; font-size:0.85rem; }
    a.back:hover { color:var(--accent); }

    .grid { display:grid; grid-template-columns: 1fr 1fr; gap:20px; max-width:1100px; margin:0 auto; }
    @media (max-width:820px){ .grid { grid-template-columns:1fr; } }

    .card {
      background:rgba(255,255,255,0.04);
      border:1px solid rgba(212,175,55,0.25);
      border-radius:16px; padding:24px;
    }
    .card h2 { color:var(--accent); font-size:0.95rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:18px; }

    /* live status */
    .live-time { font-size:3rem; font-weight:700; color:var(--accent); font-variant-numeric:tabular-nums; letter-spacing:3px; }
    .live-time.warning { color:#ff8c42; } .live-time.danger { color:#ff4757; }
    .status-row { display:flex; gap:10px; flex-wrap:wrap; margin:14px 0; }
    .badge { padding:6px 14px; border-radius:50px; font-size:0.8rem; letter-spacing:1px; }
    .badge.on { background:rgba(111,207,111,0.2); color:#6fcf6f; }
    .badge.off { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.5); }
    .badge.warn { background:rgba(255,140,66,0.2); color:#ff8c42; }
    .room-progress { margin-top:10px; color:rgba(255,255,255,0.75); }
    .room-progress b { color:var(--accent); }

    .btn-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:16px; }
    button {
      padding:12px; border:none; border-radius:10px;
      font-size:0.9rem; font-weight:700; letter-spacing:1px; cursor:pointer;
      transition:transform 0.15s, opacity 0.2s; color:var(--bg);
    }
    button:hover { transform:translateY(-2px); }
    button:disabled { opacity:0.35; cursor:not-allowed; transform:none; }
    .b-go { background:#6fcf6f; } .b-pause { background:#ff8c42; }
    .b-reset { background:#ff4757; color:#fff; }
    .b-gold { background:linear-gradient(135deg,var(--accent),var(--accent-dark)); }
    .b-ghost { background:transparent; border:1px solid rgba(212,175,55,0.4); color:var(--accent); }

    label { display:block; color:rgba(255,255,255,0.6); font-size:0.8rem; margin:14px 0 6px; letter-spacing:1px; }
    input[type=text], input[type=number], textarea, select {
      width:100%; padding:10px 14px; background:rgba(255,255,255,0.06);
      border:1px solid rgba(212,175,55,0.3); border-radius:8px; color:#fff;
      font-size:0.95rem; outline:none; font-family:inherit;
    }
    select option { background:#0a0a1a; color:#fff; }
    input:focus, textarea:focus, select:focus { border-color:var(--accent); }
    textarea { resize:vertical; min-height:60px; }

    .room-block { border:1px solid rgba(255,255,255,0.08); border-radius:12px; padding:16px; margin-bottom:14px; position:relative; }
    .room-block .room-num { color:var(--accent); font-weight:700; font-size:0.85rem; letter-spacing:1px; margin-bottom:8px; }
    .room-block.active-room { border-color:var(--accent); background:rgba(212,175,55,0.06); }
    .del-room { position:absolute; top:12px; right:12px; background:transparent; color:#ff4757; padding:2px 8px; font-size:1.1rem; }

    .gate { display:flex; justify-content:center; align-items:center; min-height:80vh; }
    .gate-card { background:rgba(255,255,255,0.04); border:1px solid rgba(212,175,55,0.3); border-radius:16px; padding:40px; width:340px; text-align:center; }
    .gate-card input { margin:16px 0; text-align:center; }
    .gate-err { color:#ff4757; font-size:0.85rem; min-height:18px; }

    .flash-row { display:flex; gap:10px; margin-top:12px; }
    .flash-row input { flex:1; }
    .quick-flash { display:flex; gap:8px; flex-wrap:wrap; margin-top:10px; }
    .quick-flash button { padding:8px 14px; font-size:0.8rem; }

    .hidden { display:none; }
    .saved-note { color:#6fcf6f; font-size:0.82rem; margin-top:10px; min-height:16px; }
    .lb-row { display:flex; justify-content:space-between; padding:6px 10px; background:rgba(255,255,255,0.04); border-radius:6px; margin:4px 0; font-size:0.9rem; }
    .lb-row .rank { color:var(--accent); font-weight:700; }
  </style>
</head>
<body>

<!-- Login gate -->
<div class="gate" id="gate">
  <div class="gate-card">
    <h1>🔐 Game Master</h1>
    <input type="password" id="gmPass" placeholder="Contraseña" autocomplete="off" />
    <button class="b-gold" style="width:100%" id="gmLogin">Entrar</button>
    <div class="gate-err" id="gateErr"></div>
  </div>
</div>

<!-- Main panel -->
<div id="panel" class="hidden">
  <div style="max-width:1100px; margin:0 auto 18px;">
    <h1>⚙ Panel del Game Master</h1>
    <div class="subtitle">Control en tiempo real · <a class="back" href="index.html" target="_blank">abrir vista del jugador ↗</a></div>
  </div>

  <div class="grid">
    <!-- LIVE STATUS + CONTROLS -->
    <div class="card">
      <h2>Estado en directo</h2>
      <div class="live-time" id="liveTime">--:--</div>
      <div class="status-row" id="statusRow"></div>
      <div class="room-progress" id="roomProgress"></div>

      <div class="btn-grid">
        <button class="b-go" id="btnStart">▶ Iniciar / Reanudar</button>
        <button class="b-pause" id="btnPause">⏸ Pausar</button>
        <button class="b-ghost" id="btnAdd5">+5 min</button>
        <button class="b-ghost" id="btnSub5">−5 min</button>
        <button class="b-gold" id="btnNextRoom">⏭ Desbloquear sala</button>
        <button class="b-reset" id="btnReset">⟳ Reiniciar partida</button>
      </div>
    </div>

    <!-- MESSAGING -->
    <div class="card">
      <h2>Mensajes al jugador</h2>
      <div class="flash-row">
        <input type="text" id="flashInput" placeholder="Escribe un mensaje..." />
        <button class="b-gold" id="btnFlash" style="width:auto; padding:10px 18px;">Enviar</button>
      </div>
      <div class="quick-flash">
        <button class="b-ghost" data-msg="¡Vais muy bien!">¡Vais muy bien!</button>
        <button class="b-ghost" data-msg="Queda poco tiempo ⏳">Queda poco</button>
        <button class="b-ghost" data-msg="Mirad con más atención 🔍">Mirad mejor</button>
        <button class="b-ghost" data-msg="¡Última sala! 🚀">Última sala</button>
      </div>

      <h2 style="margin-top:26px;">🏅 Récords</h2>
      <div id="lbList"></div>
      <button class="b-ghost" id="btnClearLb" style="width:auto; padding:8px 16px; margin-top:10px;">Borrar récords</button>
    </div>

    <!-- CONFIG -->
    <div class="card" style="grid-column:1/-1;">
      <h2>Configuración de la partida</h2>
      <label>Duración total (minutos)</label>
      <input type="number" id="durationMin" min="1" max="240" style="max-width:160px;" />

      <h2 style="margin-top:24px; font-size:0.85rem;">Salas</h2>
      <div id="roomsConfig"></div>
      <button class="b-ghost" id="btnAddRoom" style="width:auto; padding:10px 18px;">+ Añadir sala</button>

      <div style="margin-top:20px;">
        <button class="b-gold" id="btnSaveConfig" style="width:auto; padding:12px 28px;">💾 Guardar configuración</button>
        <span class="saved-note" id="savedNote"></span>
      </div>
    </div>
  </div>
</div>

<script src="shared.js"></script>
<script>
  const GM_PASS = 'admin123';

  // Keep in sync with ROOM_THEMES in index.html
  const THEME_NAMES = [
    'Cámara Dorada', 'Estación Espacial', 'Zona de Peligro', 'Laboratorio Tóxico',
    'Cripta Arcana', 'Abismo Submarino', 'Cámara de Lava', 'Jardín Encantado',
  ];

  // ── Login ──
  const gate = document.getElementById('gate');
  const panel = document.getElementById('panel');
  function tryLogin() {
    if (document.getElementById('gmPass').value === GM_PASS) {
      sessionStorage.setItem('gm_ok','1');
      gate.classList.add('hidden'); panel.classList.remove('hidden');
      initPanel();
    } else {
      document.getElementById('gateErr').textContent = 'Contraseña incorrecta.';
    }
  }
  document.getElementById('gmLogin').addEventListener('click', tryLogin);
  document.getElementById('gmPass').addEventListener('keydown', e=>{ if(e.key==='Enter') tryLogin(); });
  if (sessionStorage.getItem('gm_ok')==='1') { gate.classList.add('hidden'); panel.classList.remove('hidden'); }

  // ── Helpers ──
  function fmt(s){ s=Math.max(0,Math.ceil(s)); const m=Math.floor(s/60); return `${String(m).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`; }

  let cfg, state;
  function reload(){ cfg = ER.getConfig(); state = ER.getState(); }

  // ── Live status render ──
  function renderLive() {
    reload();
    const remaining = ER.remainingSeconds(state, cfg);
    const lt = document.getElementById('liveTime');
    lt.textContent = state.started ? fmt(remaining) : fmt(cfg.durationSec);
    const pct = cfg.durationSec>0 ? remaining/cfg.durationSec*100 : 0;
    lt.classList.remove('warning','danger');
    if (pct<=10) lt.classList.add('danger'); else if (pct<=25) lt.classList.add('warning');

    // badges
    const sr = document.getElementById('statusRow');
    let b = '';
    if (state.finished) b += state.won ? '<span class="badge on">✅ Resuelto</span>' : '<span class="badge warn">💀 Game Over</span>';
    else if (!state.started) b += '<span class="badge off">⏹ No iniciado</span>';
    else if (state.paused) b += '<span class="badge warn">⏸ Pausado</span>';
    else b += '<span class="badge on">▶ En marcha</span>';
    if ((state.penaltySec||0) > 0) b += `<span class="badge warn">+${Math.round(state.penaltySec/60)} min penalización</span>`;
    if ((state.penaltySec||0) < 0) b += `<span class="badge on">${Math.round(-state.penaltySec/60)} min extra</span>`;
    sr.innerHTML = b;

    // room progress
    const totalRooms = cfg.rooms.length;
    const cur = Math.min(state.currentRoom+1, totalRooms);
    let hintsTxt = '';
    const usedNow = state.hintsUsed[state.currentRoom] || 0;
    const availNow = (cfg.rooms[state.currentRoom]?.hints||[]).length;
    if (!state.finished) hintsTxt = ` · Pistas usadas: <b>${usedNow}/${availNow}</b>`;
    document.getElementById('roomProgress').innerHTML =
      `Sala <b>${state.finished && state.won ? totalRooms : cur}</b> de <b>${totalRooms}</b>${hintsTxt}`;

    // button states
    document.getElementById('btnStart').disabled = state.finished || (state.started && !state.paused);
    document.getElementById('btnPause').disabled = state.finished || !state.started || state.paused;
    document.getElementById('btnNextRoom').disabled = state.finished;
  }

  // ── Controls ──
  function bindControls() {
    document.getElementById('btnStart').onclick = ()=>{ ER.start(); renderLive(); };
    document.getElementById('btnPause').onclick = ()=>{ ER.pause(); renderLive(); };
    document.getElementById('btnAdd5').onclick  = ()=>{ ER.addTime(5*60); renderLive(); };
    document.getElementById('btnSub5').onclick  = ()=>{ ER.addTime(-5*60); renderLive(); };
    document.getElementById('btnNextRoom').onclick = ()=>{
      const s = ER.getState();
      s.currentRoom = Math.min(s.currentRoom+1, ER.getConfig().rooms.length);
      ER.setState(s); renderLive();
    };
    document.getElementById('btnReset').onclick = ()=>{
      if (confirm('¿Reiniciar la partida? Se borrará el progreso actual.')) { ER.resetState(); renderLive(); }
    };

    document.getElementById('btnFlash').onclick = sendFlash;
    document.getElementById('flashInput').addEventListener('keydown', e=>{ if(e.key==='Enter') sendFlash(); });
    document.querySelectorAll('.quick-flash button').forEach(btn=>{
      btn.onclick = ()=>{ ER.flash(btn.dataset.msg); flashNote(); };
    });
    document.getElementById('btnClearLb').onclick = ()=>{
      if (confirm('¿Borrar todos los récords?')) { ER.clearScores(); renderLeaderboard(); }
    };

    document.getElementById('btnAddRoom').onclick = ()=>{ addRoomBlock({code:'',hints:['','','']}); };
    document.getElementById('btnSaveConfig').onclick = saveConfig;
  }

  function sendFlash() {
    const inp = document.getElementById('flashInput');
    if (inp.value.trim()) { ER.flash(inp.value.trim()); inp.value=''; flashNote(); }
  }
  function flashNote() {
    const n = document.getElementById('savedNote');
    n.textContent = 'Mensaje enviado ✓'; setTimeout(()=>n.textContent='', 2000);
  }

  // ── Config editor ──
  function renderConfigEditor() {
    reload();
    document.getElementById('durationMin').value = Math.round(cfg.durationSec/60);
    const wrap = document.getElementById('roomsConfig');
    wrap.innerHTML = '';
    cfg.rooms.forEach(r => addRoomBlock(r));
  }

  function addRoomBlock(room) {
    const wrap = document.getElementById('roomsConfig');
    const idx = wrap.children.length;
    const div = document.createElement('div');
    div.className = 'room-block';
    if (idx === state.currentRoom && state.started && !state.finished) div.classList.add('active-room');
    div.innerHTML = `
      <div class="room-num">SALA ${idx+1}</div>
      <button class="del-room" title="Eliminar">×</button>
      <label>Código de desbloqueo</label>
      <input type="text" class="room-code" value="${(room.code||'').replace(/"/g,'&quot;')}" placeholder="ej. 1234567890" />
      <label>Tema visual</label>
      <select class="room-theme">
        <option value="-1">Automático (por orden)</option>
        ${THEME_NAMES.map((n,ti)=>`<option value="${ti}" ${room.theme===ti?'selected':''}>${n}</option>`).join('')}
      </select>
      <label>Pistas (una por línea)</label>
      <textarea class="room-hints" placeholder="Primera pista&#10;Segunda pista&#10;Tercera pista">${(room.hints||[]).join('\n')}</textarea>
    `;
    div.querySelector('.del-room').onclick = ()=>{
      if (wrap.children.length <= 1) { alert('Debe haber al menos una sala.'); return; }
      div.remove(); renumberRooms();
    };
    wrap.appendChild(div);
  }
  function renumberRooms() {
    document.querySelectorAll('#roomsConfig .room-block').forEach((b,i)=>{
      b.querySelector('.room-num').textContent = 'SALA '+(i+1);
    });
  }

  function saveConfig() {
    const dur = Math.max(1, parseInt(document.getElementById('durationMin').value)||60);
    const rooms = [];
    document.querySelectorAll('#roomsConfig .room-block').forEach(b=>{
      const code = b.querySelector('.room-code').value.trim().toUpperCase();
      const hints = b.querySelector('.room-hints').value.split('\n').map(h=>h.trim()).filter(Boolean);
      const theme = parseInt(b.querySelector('.room-theme').value);
      if (code) {
        const room = { code, hints };
        if (theme >= 0) room.theme = theme;   // -1 = auto
        rooms.push(room);
      }
    });
    if (!rooms.length) { alert('Define al menos una sala con código.'); return; }
    ER.setConfig({ durationSec: dur*60, rooms });
    const n = document.getElementById('savedNote');
    n.textContent = 'Configuración guardada ✓'; setTimeout(()=>n.textContent='', 2500);
    renderLive();
  }

  // ── Leaderboard ──
  function renderLeaderboard() {
    const lb = ER.getScores();
    const el = document.getElementById('lbList');
    el.innerHTML = lb.length
      ? lb.map((e,i)=>`<div class="lb-row"><span><span class="rank">#${i+1}</span> ${e.name}</span><span>${fmt(e.remaining)}</span></div>`).join('')
      : '<div style="color:rgba(255,255,255,0.4); font-size:0.85rem;">Aún no hay récords.</div>';
  }

  // ── Init ──
  function initPanel() {
    bindControls();
    renderConfigEditor();
    renderLeaderboard();
    renderLive();
    setInterval(renderLive, 500);
    ER.onMessage((m)=>{
      if (m.type==='state' || m.type==='reset') renderLive();
      if (m.type==='config') renderConfigEditor();
    });
  }
</script>
</body>
</html>
